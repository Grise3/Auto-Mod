<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="scripts.js"></script>
    <style>
        .error-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .error-code {
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            text-shadow: 0 0 30px rgba(35, 165, 89, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .error-icon {
            font-size: 4rem;
            color: var(--text-muted);
            margin: 20px 0;
        }

        .error-title {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: white;
        }

        .error-message {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-home {
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-home:hover {
            background: #1a7a3e;
            transform: translateY(-2px);
        }

        .btn-back {
            background: var(--card);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #232737;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .btn-back:hover {
            background: #2b2d31;
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-icon">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved. 
            If you believe this is an error, please report it on our GitHub.
        </p>
        <div class="error-actions">
            <a href="index.html" class="btn-home">
                <i class="fas fa-home"></i> Go Home
            </a>
            <button class="btn-back" onclick="history.back()">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>
        </div>
    </div>

    <div id="footer-placeholder"></div>
</body>
</html>
